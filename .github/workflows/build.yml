name: Build Windows App
on:
  workflow_dispatch:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install dependencies
        shell: pwsh
        run: |
          Remove-Item package-lock.json -Force -ErrorAction SilentlyContinue
          npm install --force --include=optional
          npm install --force @rollup/rollup-win32-x64-msvc --no-save
      - run: npm run build
      - name: Package Electron app
        shell: pwsh
        run: npx @electron/packager . AscendFBA --platform=win32 --arch=x64 --app-version=1.0.0 --out=electron-release --overwrite --ignore='^/src' --ignore='^/public' --ignore='^/electron-release'
      - name: Zip
        run: Compress-Archive -Path electron-release/AscendFBA-win32-x64 -DestinationPath AscendFBA-win32-x64.zip
      - name: Upload browser download
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Latest Windows Build
          make_latest: true
          files: AscendFBA-win32-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: AscendFBA-win32-x64
          path: AscendFBA-win32-x64.zip
